# ════════════════════════════════════════════════════════════════════
#              alacritty.toml — Simple Matte Black                            
# ════════════════════════════════════════════════════════════════════

# ── Window ────────────────────────────────────────────────────────────
[window]
padding.x = 10
padding.y = 8
decorations = "None"
opacity = 0.95
startup_mode = "Windowed"

# ── Scrolling ─────────────────────────────────────────────────────────
[scrolling]
history = 10000
multiplier = 3

# ── Font ──────────────────────────────────────────────────────────────
[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

# ── Cursor ────────────────────────────────────────────────────────────
[cursor]
style.shape = "Block"
style.blinking = "On"
blink_interval = 800
thickness = 0.15

# ── Terminal ──────────────────────────────────────────────────────────
[terminal]
shell.program = "/usr/bin/fish"
shell.args = ["-i"]

# ── Colors (Matte Black) ────────────────────────────────────────────────
[colors.primary]
background = "#000000"
foreground = "#bfbfbf"

[colors.cursor]
text = "#000000"
cursor = "#bfbfbf"

# ── Keyboard bindings ────────────────────────────────────────────────
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"