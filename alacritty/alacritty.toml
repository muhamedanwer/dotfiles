# ════════════════════════════════════════════════════════════════════
#              alacritty.toml — Darker Matte Black Edition               
# ════════════════════════════════════════════════════════════════════

# ── Window ────────────────────────────────────────────────────────────
[window]
padding.x         = 12
padding.y         = 10
decorations       = "None"         # no titlebar — clean borderless look
opacity           = 0.90           # slight transparency — pairs with hyprland blur
blur              = true           # blur the background (requires compositor support)
startup_mode      = "Windowed"
title             = "Alacritty"
dynamic_title     = true           # show current process in title

# ── Scrolling ─────────────────────────────────────────────────────────
[scrolling]
history    = 10000                 # large scrollback buffer
multiplier = 5                     # faster scroll speed

# ── Font ──────────────────────────────────────────────────────────────
[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# Fallback fonts if JetBrains isn't installed
# family = "FiraCode Nerd Font"
# family = "Hack Nerd Font"
# family = "monospace"

# ── Cursor ────────────────────────────────────────────────────────────
[cursor]
style.shape   = "Block"            # Block | Underline | Beam
style.blinking = "On"
blink_interval = 600               # ms between blinks
blink_timeout  = 0                 # 0 = never stop blinking
unfocused_hollow = true            # hollow cursor when window unfocused
thickness = 0.15

# ── Terminal ──────────────────────────────────────────────────────────
[terminal]
osc52 = "CopyPaste"                # allow clipboard access via OSC 52

# ── Mouse ─────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true            # hide cursor while typing

# ── Selection ─────────────────────────────────────────────────────────
[selection]
save_to_clipboard = true           # auto-copy selection to clipboard
semantic_escape_chars = ",|`|:\"' ()[]{}<>\t"

# ── Colors (Darker Matte Black) ────────────────────────────────────────────
# Palette sourced from github.com/tahayvr/matte-black-theme

[colors.primary]
background='#0a0a0a'
foreground='#c9c9c9'
dim_foreground='#6a6a6a'

[colors.cursor]
text='#0a0a0a'
cursor='#6a6a6a'

[colors.vi_mode_cursor]
text='#0a0a0a'
cursor='#6a6a6a'

[colors.search.matches]
foreground='#c9c9c9'
background='#0a0a0a'

[colors.search.focused_match]
foreground='#c9c9c9'
background='#0a0a0a'

[colors.hints.start]
foreground='#c9c9c9'
background='#0a0a0a'

[colors.hints.end]
foreground='#c9c9c9'
background='#0a0a0a'

[colors.selection]
text='#0a0a0a'
background='#0a0a0a'

[colors.normal]
black='#2d2d2d'
red='#e06c75'
green='#98c379'
yellow='#e5c07b'
blue='#61afef'
magenta='#c678dd'
cyan='#56b6c2'
white='#c9c9c9'

[colors.bright]
black='#2d2d2d'
red='#e06c75'
green='#98c379'
yellow='#e5c07b'
blue='#61afef'
magenta='#c678dd'
cyan='#56b6c2'
white='#c9c9c9'

[colors.dim]
black='#2d2d2d'
red='#e06c75'
green='#98c379'
yellow='#e5c07b'
blue='#61afef'
magenta='#c678dd'
cyan='#56b6c2'
white='#c9c9c9'


# ── Keyboard bindings ─────────────────────────────────────────────────
[[keyboard.bindings]]
key    = "V"
mods   = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key    = "C"
mods   = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key    = "Plus"
mods   = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key    = "Minus"
mods   = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key    = "0"
mods   = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key    = "F11"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key    = "K"
mods   = "Control|Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key    = "J"
mods   = "Control|Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key    = "Home"
mods   = "Shift"
action = "ScrollToTop"

[[keyboard.bindings]]
key    = "End"
mods   = "Shift"
action = "ScrollToBottom"