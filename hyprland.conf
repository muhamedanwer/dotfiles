################
### MONITORS ###
################
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################
$terminal    = alacritty
$fileManager = dolphin
$menu        = wofi --show drun --allow-images
$browser     = chromium


#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = swww-daemon
exec-once = sleep 0.2 && swww img ~/Pictures/wallpapers/gargantua-black.jpg --transition-type outer --transition-duration 1.5

exec-once = mako
exec-once = nm-applet
exec-once = wl-paste --type text --watch clipman store

# [PERF] Idle inhibitor — stops GPU from sleeping mid-session
exec-once = swayidle -w timeout 300 'swaylock' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ---------- NVIDIA ----------
# [PERF] Core NVIDIA Wayland stack — these three are required
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# [PERF] Use direct backend for better NVIDIA performance (Hyprland ≥ 0.41)
env = NVD_BACKEND,direct

# [PERF] Electron/Chromium apps run natively on Wayland (no XWayland overhead)
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OZONE_PLATFORM,wayland

# [PERF] Uncomment only if you see flickering cursor or screen tearing
#env = WLR_NO_HARDWARE_CURSORS,1
#env = WLR_DRM_NO_ATOMIC,1

# [PERF] Uncomment to disable G-Sync / VRR if you don't use it (saves a render path)
#env = __GL_GSYNC_ALLOWED,0
#env = __GL_VRR_ALLOWED,0


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in     = 3
    gaps_out    = 5
    border_size = 0     
    # col.active_border   = rgba(ffffff18) rgba(ffffff08) 45deg
    col.active_border   = rgba(00000000)
    col.inactive_border = rgba(00000000)

    resize_on_border = true               
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding         = 14                   
    active_opacity   = 1.0

    shadow {
        enabled      = true
        range        = 28                   
        render_power = 3
        color        = rgba(00000040)      
        offset       = 0 6                  
    }

    blur {
        enabled           = true
        size              = 6               # kernel radius
        passes            = 2              # more passes = smoother blur
        noise             = 0.015          # subtle grain, like frosted glass
        contrast          = 0.9
        brightness        = 0.85
        vibrancy          = 0.18           
        vibrancy_darkness = 0.5
        new_optimizations = true           # [PERF] reuses blur cache — free speed
        xray              = false          # [PERF] don't blur through stacked windows
    }
}

animations {
    enabled = true

    #  Spring feel: fast acceleration, slight overshoot, smooth landing
    bezier = macSpring,  0.5,  0.0,  0.25, 1.0
    # Slide feel: ease-out curve used for workspace / fade transitions
    bezier = macSlide,   0.25, 0.1,  0.25, 1.0
    # Snappy close: quick collapse, no overshoot
    bezier = macClose,   0.35, 0.0,  0.65, 1.0
    # Window open   — spring in, slightly slower so you can "see" it
    animation = windowsIn,   1, 4, macSpring, slide
    # Window close  — quick snap away
    animation = windowsOut,  1, 2, macClose,  slide
    # Window move/resize — spring feel
    animation = windowsMove, 1, 3, macSpring
    animation = border,      1, 3, macSlide
    animation = fade,        1, 3, macSlide
    animation = workspaces,  1, 4, macSlide, slide
    animation = layers,      1, 2, macSlide, fade
}

layerrule = blur true, match:class waybar
layerrule = blur true, match:class wofi
layerrule = blur true, match:class mako
layerrule = blur true, match:class notifications

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true          
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true

    vfr = true

    # [PERF] Skip a compositor render pass when source content hasn't changed
    # render_ahead_of_time = false   # keep false for NVIDIA — causes tearing on some drivers

    animate_mouse_windowdragging = false

    focus_on_activate = false
}


#############
### INPUT ###
#############
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0.5

    touchpad {
        natural_scroll   = true            
        tap-to-click     = true
        drag_lock        = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
    workspace_swipe_cancel_ratio = 0.15    
}


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space,  exec, $menu
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, W,      exec, $browser
bind = $mainMod, R,      exec, alacritty -e ranger
bind = $mainMod, C,      exec, code

# Window control
bind = $mainMod, Q, killactive
bind = $mainMod, T, togglefloating
bind = $mainMod, F, fullscreen

# System
bind = $mainMod SHIFT, E, exit
bind = $mainMod, X, exec, swaylock

# Focus 
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive, 20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0 20

# Move windows
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces via scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Grouping
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, moveintogroup

# Scratchpad terminal
bind = $mainMod, grave, exec, alacritty --class scratchpad

# Screenshot
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f -

# [MAC] Full-screen screenshot to clipboard (like Cmd+Shift+3)
bind = $mainMod SHIFT, S, exec, grim - | wl-copy

# Clipboard menu
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# [QoL] Quick lock
bind = $mainMod, X, exec, swaylock


##############################
### WINDOW RULES           ###
##############################

# Floating apps
windowrule = float true, match:class pavucontrol
windowrule = float true, match:class nm-connection-editor
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class file-roller

# Center floating dialogs
windowrule = center true, match:class pavucontrol
windowrule = center true, match:class nm-connection-editor
windowrule = center true, match:class blueman-manager
windowrule = center true, match:class file-roller

# Scratchpad
windowrule = float true,   match:class scratchpad
windowrule = size 900 600, match:class scratchpad
windowrule = center true,  match:class scratchpad

windowrule = opacity 0.92, match:class alacritty
windowrule = opacity 0.92, match:class kitty

windowrule = suppress_event maximize, match:class .*

windowrule = no_blur true, match:class chromium          
