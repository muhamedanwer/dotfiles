################
### MONITORS ###
################
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal    = alacritty
$fileManager = dolphin
$menu        = wofi --show drun --allow-images
$browser     = chromium

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = swww-daemon 
exec-once = sleep 0.2 && swww img ~/Pictures/wallpapers/gargantua-black.jpg --transition-type outer

exec-once = mako
exec-once = nm-applet
exec-once = wl-paste --type text --watch clipman store

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# NVIDIA fixes
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = WLR_NO_HARDWARE_CURSORS,1
#env = WLR_DRM_NO_ATOMIC,1
#env = __GL_GSYNC_ALLOWED,0
#env = __GL_VRR_ALLOWED,0

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in     = 3
    gaps_out    = 0
    border_size = 1

    col.active_border   = rgba(8a8a8dff) rgba(3d3d3dcc) 45deg
    col.inactive_border = rgba(1e1e1eff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 6
    active_opacity   = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled      = true
        range        = 6
        render_power = 3
        color        = rgba(00000055)
    }

    blur {
        enabled  = true
        size     = 2
        passes   = 1
        noise    = 0.01
        vibrancy = 0.08
    }
}

animations {
    enabled = true

    # macOS-like easing (quick start, soft landing)
    bezier = mac, 0.25, 0.1, 0.25, 1.0

    # smooth but not slow
    animation = windows,    1, 3, mac
    animation = windowsOut, 1, 2, mac
    animation = border,     1, 2, default
    animation = fade,       1, 2, default
    animation = workspaces, 1, 3, mac
}
dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

#############
### INPUT ###
#############
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0.5

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space,  exec, $menu
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, W,      exec, $browser
bind = $mainMod, R,      exec, kitty -e ranger
bind = $mainMod, C,      exec, code

# Window control
bind = $mainMod, Q, killactive
bind = $mainMod, T, togglefloating
bind = $mainMod, F, fullscreen

# System
bind = $mainMod SHIFT, E, exit
bind = $mainMod, X, exec, swaylock

# Focus (vim)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive, 20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0 20

# Move windows
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bind = $mainMod, 1, workspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
# (repeat for 2–9 as you had)

# Grouping (NEW)
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, moveintogroup

# Scratchpad terminal (NEW)
bind = $mainMod, grave, exec, alacritty --class scratchpad

# Screenshot
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f -

# Clipboard menu
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

##############################
### WINDOWS RULES ###
##############################
# Floating apps
windowrule = float true, match:class pavucontrol
windowrule = float true, match:class nm-connection-editor
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class file-roller

# Center them (old method workaround)
windowrule = center true, match:class pavucontrol
windowrule = center true, match:class nm-connection-editor
windowrule = center true, match:class blueman-manager
windowrule = center true, match:class file-roller

# Scratchpad
windowrule = float true, match:class scratchpad
windowrule = size 900 600, match:class scratchpad
windowrule = center true, match:class scratchpad

# General fixes
#windowrule = suppressevent maximize, class:.*
#windowrule = noborder true, floating:1
