# Starship Configuration - Matte Black Theme

add_newline = true
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break$character"""

[username]
style_user = "blue"
style_root = "red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "@[$hostname](bold blue) "
disabled = false

[directory]
style = "blue"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "magenta"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "red"
conflicted = "="
ahead = "↑"
behind = "↓"
diverged = "↕"
untracked = "?"
stashed = "$"
modified = "!"
deleted = ""

[nodejs]
format = "via [$symbol($version )]($style)"
style = "bold green"
disabled = false

[python]
format = "via [$symbol($version )]($style)"
style = "bold yellow"
disabled = false
python_binary = "python3"

[rust]
format = "via [$symbol($version )]($style)"
style = "bold red"
disabled = false

[golang]
format = "via [$symbol($version )]($style)"
style = "bold cyan"
disabled = false

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow"

[character]
success_symbol = "[❯](bold blue)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold green)"