# Hypridle Config - Idle management for Hyprland
# ~/.config/hypr/hypridle.conf

# Lock screen after 5 minutes idle
listener {
    timeout = 300
    on-timeout = hyprlock
    on-resume = hyprctl dispatch dpms on
}

# Turn off screen after 10 minutes idle
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Dim screen after 3 minutes idle
listener {
    timeout = 180
    on-timeout = brightnessctl set 10%
    on-resume = brightnessctl restore
}

# Pause notifications after 1 minute idle (focus mode)
listener {
    timeout = 60
    on-timeout = makoctl set-mode focus
    on-resume = makoctl set-mode default
}