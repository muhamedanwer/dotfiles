################
### MONITORS ###
################
monitor=eDP-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal    = alacritty
$fileManager = dolphin
$menu        = rofi -show drun -theme ~/.config/rofi/quick-input.rasi
$browser     = firefox

#################
### AUTOSTART ###
#################
# [PERF] Minimal autostart - remove animated wallpaper daemons
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = nm-applet
exec-once = wl-paste --type text --watch clipman store

# [PERF] Idle inhibitor — stops GPU from sleeping mid-session
exec-once = hypridle
# [SCRATCHPAD] Pre-spawn scratchpad terminal — toggles instantly, session persists
exec-once = alacritty --class scratchpad

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ---------- Wayland ----------
env = XDG_SESSION_TYPE,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OZONE_PLATFORM,wayland


###################
### LOOK AND FEEL ###
###################

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border   = rgba(707070cc)
    col.inactive_border = rgba(1e1e1e99)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000088)
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    force_split    = 2
}

master {
    new_status    = slave
    mfact         = 0.55
    #center_master = false
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true


    animate_mouse_windowdragging = false
    animate_manual_resizes       = false

    focus_on_activate = false
}

#############
### INPUT ###
#############
input {
    kb_layout    = us,ara
    follow_mouse = 2
    sensitivity  = 0.5
    accel_profile = flat

    repeat_delay = 250
    repeat_rate  = 35

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

gestures {
#    workspace_swipe              = true
    workspace_swipe_distance     = 300
    workspace_swipe_invert       = true
    workspace_swipe_cancel_ratio = 0.15
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space,  exec, $menu
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, W,      exec, $browser
bind = $mainMod, R,      exec, alacritty -e ranger
bind = $mainMod, C,      exec, code

# Window control
bind = $mainMod, Q, killactive
bind = $mainMod, T, togglefloating
bind = $mainMod, F, fullscreen

# System
bind = $mainMod SHIFT, E, exit
bind = $mainMod, X,       exec, hyprlock
bind = $mainMod, F11,     exec, ~/.config/hypr/scripts/focus-mode.sh

# Focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive,  20 0
bind = $mainMod SHIFT, K, resizeactive,  0 -20
bind = $mainMod SHIFT, J, resizeactive,  0  20

# Move windows
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces via scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Grouping
bind = $mainMod,       G, togglegroup
bind = $mainMod SHIFT, G, moveintogroup

# Layout switcher  —  SUPER+\
bind = $mainMod, backslash, submap, layout

submap = layout

    bind = , D, exec, hyprctl keyword general:layout dwindle
    bind = , D, submap, reset

    bind = , M, exec, hyprctl keyword general:layout master
    bind = , M, submap, reset

    bind = , O, exec, bash -c "hyprctl keyword general:layout master && hyprctl dispatch layoutmsg monocle"
    bind = , O, submap, reset

    bind = , S, exec, hyprctl keyword general:layout scroller
    bind = , S, submap, reset

    bind = , Escape, submap, reset
    bind = , Return, submap, reset

submap = reset

bind = $mainMod, P,     layoutmsg, swapwithmaster
bind = $mainMod, grave, togglespecialworkspace, magic

# Screenshot
bind = $mainMod,       S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod SHIFT, S, exec, grim - | wl-copy

# Keyboard layout switching
bind = CTRL, SPACE, exec, hyprctl switchxkblayout all next

# Clipboard
bind = SUPER, V, exec, cliphist list | rofi -dmenu -i -p Clipboard -theme ~/.config/rofi/quick-input.rasi | cliphist decode | wl-copy

##############################
### WINDOW RULES           ###
##############################

windowrule = float  true, match:class pavucontrol
windowrule = float  true, match:class nm-connection-editor
windowrule = float  true, match:class blueman-manager
windowrule = float  true, match:class file-roller

windowrule = center true, match:class pavucontrol
windowrule = center true, match:class nm-connection-editor
windowrule = center true, match:class blueman-manager
windowrule = center true, match:class file-roller

windowrule = workspace special:magic silent, match:class scratchpad
windowrule = float  true,   match:class scratchpad
windowrule = size   900 600, match:class scratchpad
windowrule = center true,   match:class scratchpad

windowrule = suppress_event maximize, match:class .*

windowrule = workspace 1, match:class code$
windowrule = workspace 2, match:class firefox$
windowrule = workspace 3, match:class alacritty$

# ============================================
# XWAYLAND
# ============================================
xwayland {
    force_zero_scaling = true
}

bind = $mainMod, D, exec, hyprctl keyword general:gaps_in 20 && hyprctl keyword decoration:blur:enabled true
bind = $mainMod SHIFT, D, exec, hyprctl keyword general:gaps_in 0 && hyprctl keyword decoration:blur:enabled false

