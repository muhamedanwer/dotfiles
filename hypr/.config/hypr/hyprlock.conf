# Matte Black Hyprlock Configuration

# Background
background {
    monitor = 
    path = ~/Pictures/wallpapers/void-black.png
    color = 0x0a0a0a
    blur_passes = 0
    blur_size = 0
    noise = 0
    contrast = 1.0
    brightness = 0.95
    vibrancy = 0
    vibrancy_darkness = 0
}

# Input field
input-field {
    size = 300, 50
    outline_thickness = 1
    dots_size = 0.15
    dots_spacing = 0.25
    dots_rounding = -1
    dots_center = true
    outer_color = 0x1a1a1a
    inner_color = 0x0a0a0a
    font_color = 0xd0d0d0
    placeholder_text = "Password"
    placeholder_font_color = 0x606060
    hide_input = false
    rounding = 6
    check_color = 0x70a070
    fail_color = 0xd06060
    fail_text_color = 0xd0d0d0
    fail_font_color = 0xd0d0d0
    inactive_color = 0x303030
    placeholder_text_color = 0x606060
    position = 0, -60
    halign = center
    valign = center
}

# Label (time/date)
label {
    monitor = 
    text = "{time:%H:%M}"
    font_size = 72
    font_family = "JetBrains Mono Nerd Font"
    color = 0xd0d0d0
    position = 0, 60
    halign = center
    valign = center
    enabled = true
}

label {
    monitor = 
    text = "{time:%A, %d %B %Y}"
    font_size = 14
    font_family = "JetBrains Mono Nerd Font"
    color = 0x808080
    position = 0, 140
    halign = center
    valign = center
    enabled = true
}

# Battery
label {
    monitor = 
    text = "{battery}% {battery_icon}"
    font_size = 12
    font_family = "JetBrains Mono Nerd Font"
    color = 0x909090
    position = 20, 20
    halign = left
    valign = top
    enabled = true
}

# Network
label {
    monitor = 
    text = "{wifi_essid} {wifi_signal}%"
    font_size = 12
    font_family = "JetBrains Mono Nerd Font"
    color = 0x909090
    position = -20, 20
    halign = right
    valign = top
    enabled = true
}

# Caps lock indicator
label {
    monitor = 
    text = "{caps_lock}"
    font_size = 11
    font_family = "JetBrains Mono Nerd Font"
    color = 0xd0a060
    position = 0, -140
    halign = center
    valign = center
    enabled = true
}

# Failed attempts
label {
    monitor = 
    text = "Failed: {failed_attempts}"
    font_size = 11
    font_family = "JetBrains Mono Nerd Font"
    color = 0xd06060
    position = 0, -170
    halign = center
    valign = center
    enabled = true
}