#  MATTE BLACK PALETTE
# ─────────────────────────────────────────────────────────────────────
#
#   background   #1e1e1e   deep matte black
#   foreground   #8a8a8d   cool gray (also the OG active border)
#   inactive     #1e1e1e   invisible border
#   red          #e06c75
#   orange       #d19a66
#   yellow       #e5c07b
#   green        #98c379
#   purple       #c678dd
#   blue         #61afef
#
#  Border choice (no orange):
#    active   → #8A8A8D → #3d3d3d 45deg  (original OG Matte Black border)
#    inactive → #1e1e1e  — invisible, pure matte
# ─────────────────────────────────────────────────────────────────────

################
### MONITORS ###
################
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal    = alacritty
$fileManager = thunar
$menu        = wofi --show drun --allow-images
$browser     = chromium

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = nm-applet
# Clipboard manager (optional) – uncomment one if needed:
exec-once = wl-paste --type text --watch clipman store   # requires clipman
exec-once = copyq --daemon

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in     = 3
    gaps_out    = 0
    border_size = 1

    # Matte Black borders — cool gray on pure black, no orange
    col.active_border   = rgba(8a8a8dff) rgba(3d3d3dcc) 45deg
    col.inactive_border = rgba(1e1e1eff)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 6
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 6
        render_power = 3
        color        = rgba(0d0d0dee)
    }

    blur {
        enabled  = true
        size     = 4
        passes   = 3
        noise    = 0.01
        vibrancy = 0.15
    }
}

animations {
    enabled = true

    bezier = ease, 0.25, 1, 0.5, 1

    animation = windows,    1, 7,  ease
    animation = border,     1, 10, ease
    animation = fade,       1, 5,  ease
    animation = workspaces, 1, 5,  ease
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 2   # 0 = none, 1 = anime girl, 2 = pride
    disable_hyprland_logo   = true
}

#############
### INPUT ###
#############
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# ── Apps ──────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space,  exec, $menu
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, W,      exec, $browser
bind = $mainMod, R,      exec, kitty -e ranger
bind = $mainMod, V,      exec, alacritty -e vim
bind = $mainMod, C,      exec, code

# ── Window control ────────────────────────────────────────────────────
bind = $mainMod,       Q, killactive
bind = $mainMod,       T, togglefloating
bind = $mainMod,       F, fullscreen

# ── System ────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, E, exit
bind = $mainMod,       X, exec, swaylock

# ── Focus  (vim hjkl) ─────────────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ── Resize (vim hjkl) ─────────────────────────────────────────────────
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive,  20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0  20

# ── Move windows (vim hjkl) ───────────────────────────────────────────
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# ── Mouse drag ────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Workspaces ────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# ── Scratchpad ────────────────────────────────────────────────────────
bind = $mainMod,       minus, togglespecialworkspace, magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic

# ── Screenshot ────────────────────────────────────────────────────────
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f -

# ── Media & volume ────────────────────────────────────────────────────
bind  = , XF86AudioLowerVolume, exec, pamixer --decrease 5
bind  = , XF86AudioRaiseVolume, exec, pamixer --increase 5
bind  = , XF86AudioMute,        exec, pamixer --toggle-mute
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy


##############################
### WINDOWS AND WORKSPACES ###
##############################


# Float specific applications
windowrule = match:float true, match:class pavucontrol
windowrule = match:float true, match:class nm-connection-editor
windowrule = match:float true, match:class blueman-manager
windowrule = match:float true, match:class file-roller
windowrule = match:float true, match:title Picture-in-Picture

# Set default sizes for floating windows
windowrule = size 800 600, match:class pavucontrol
windowrule = size 600 400, match:class nm-connection-editor
windowrule = size 700 500, match:class blueman-manager

# Center them on screen
windowrule = center true , match:class pavucontrol
windowrule = center true, match:class nm-connection-editor
windowrule = center true, match:class blueman-manager

# Opacity rules
windowrule = opacity 0.5 0.5, match:float true         # All floating windows 50% opacity
windowrule = opacity 0.8 0.8, match:class alacritty  # Alacritty terminal 80% opacity
