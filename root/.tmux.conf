set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 5

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind | split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind Tab next-window
bind C-Tab previous-window

bind -n M-Left previous-window
bind -n M-Right next-window

set -g status-style "fg=#d0d0d0 bg=#1a1a1a"
set -g message-style "fg=#d0d0d0 bg=#1a1a1a"
set -g pane-border-style "fg=#404040"
set -g pane-active-border-style "fg=#70a0c0"

set -g status-left "#[fg=#70a0c0]#S "
set -g status-right "#[fg=#808080]%Y-%m-%d %H:%M"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[fg=#70a0c0,bold]#I:#W "
set -g window-status-separator ""
